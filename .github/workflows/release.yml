name: Release

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mfe/package-lock.json

      - name: Build agent package
        shell: pwsh
        run: ./scripts/build.ps1

      - name: Package release zip
        shell: pwsh
        run: ./scripts/package-release.ps1

      - name: Read version from manifest
        id: version
        shell: pwsh
        run: |
          $manifest = Get-Content manifest.json | ConvertFrom-Json
          "version=$($manifest.version)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "tag=v$($manifest.version)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "asset=demo-agent-v$($manifest.version).zip" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: demo-agent-${{ steps.version.outputs.version }}
          path: release/${{ steps.version.outputs.asset }}
          if-no-files-found: error

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $tag = "${{ steps.version.outputs.tag }}"
          $version = "${{ steps.version.outputs.version }}"
          $asset = "release/${{ steps.version.outputs.asset }}"
          $title = "Demo Agent $version"

          $releaseExists = $false
          gh release view $tag 2>$null
          if ($LASTEXITCODE -eq 0) { $releaseExists = $true }

          if ($releaseExists) {
            Write-Host "Updating existing release $tag"
            gh release upload $tag $asset --clobber
          } else {
            Write-Host "Creating release $tag"
            gh release create $tag $asset --title $title --generate-notes
          }
